<div class="pokemon-grid">
  <div class="pokemon-card" *ngFor="let p of pokemons" (click)="goToDetail(p.name)">
    <div class="card-image">
      <img [src]="p.image" [alt]="p.name">
    </div>
    <div class="card-info">
      <span class="id">#{{ p.id | number:'3.0' }}</span>
      <h3>{{ p.name | titlecase }}</h3>
      <div class="types">
        <span *ngFor="let t of p.types" [class]="'badge ' + t">{{ t }}</span>
      </div>
    </div>
  </div>
</div>

<div class="load-more-container">
  <button class="btn-load" (click)="loadMore()" [disabled]="loading">
    {{ loading ? 'Loading...' : 'Load More' }}
  </button>
</div>
