<div class="detail-container" *ngIf="pokemon">
  <nav class="detail-nav">
    <button class="back-btn" (click)="goBack()">← Back to Pokedex</button>
  </nav>
  
  <div class="detail-card">
    <div class="image-section">
      <div class="circle-bg"></div>
      <img [src]="pokemon.image" [alt]="pokemon.name">
    </div>

    <div class="info-section">
      <span class="pokemon-id">#{{ pokemon.id | number:'3.0' }}</span>
      <h2 class="pokemon-name">{{ pokemon.name | titlecase }}</h2>
      
      <div class="type-badges">
        <span *ngFor="let t of pokemon.types" [class]="'badge ' + t">{{ t }}</span>
      </div>

      <div class="physical-info">
        <div class="info-item">
          <span class="label">Height</span>
          <span class="value">{{ pokemon.height / 10 }}m</span>
        </div>
        <div class="info-item">
          <span class="label">Weight</span>
          <span class="value">{{ pokemon.weight / 10 }}kg</span>
        </div>
      </div>

      <div class="stats-container">
        <h3>Base Stats</h3>
        <div *ngFor="let s of pokemon.stats" class="stat-line">
          <span class="stat-name">{{ s.name }}</span>
          <div class="stat-bar-bg">
            <div class="stat-bar-fill" [style.width.%]="(s.value / 150) * 100"></div>
          </div>
          <span class="stat-value">{{ s.value }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
